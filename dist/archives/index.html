if (typeof window !== 'undefined') {
  
  let toastTimer = null;

  function initThemeToggle() {
    const htmlRoot = document.querySelector('html');
    const themeToggle = document.getElementById('themeToggle');

    const getTheme = () => {
      const localStorageTheme = localStorage?.getItem("theme") ?? '';
      if (['dark', 'light', 'system'].includes(localStorageTheme)) {
        return localStorageTheme;
      }
      return 'system';
    };

    // 从 DOM 属性实时获取翻译
    const translations = {
      light: themeToggle.dataset.tLight,
      dark: themeToggle.dataset.tDark,
      system: themeToggle.dataset.tSystem
    };

    function showThemeToast(themeName) {
      let toast = document.getElementById('theme-toast') || (() => {
        const t = document.createElement('div');
        t.id = 'theme-toast';
        document.body.appendChild(t);
        return t;
      })();

      toast.textContent = translations[themeName] || translations['system'];
      
      clearTimeout(toastTimer);
      toast.classList.remove('show');
      void toast.offsetWidth; 
      toast.classList.add('show');

      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const setTheme = (themeSet, isFirstLoad = false) => { 
      if (themeSet === 'dark') {
        htmlRoot.setAttribute('data-theme', 'dark');
        htmlRoot.classList.remove('system-theme');
      } else if (themeSet === 'light') {
        htmlRoot.removeAttribute('data-theme');
        htmlRoot.classList.remove('system-theme');
      } else {
        htmlRoot.classList.add('system-theme');
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
      window.localStorage.setItem('theme', themeSet);

      // --- 新增：如果不是页面初次加载，则显示弹窗 ---
      if (!isFirstLoad) {
        showThemeToast(themeSet);
      }
    };

    // 系统主题变化监听器
    const handleSystemThemeChange = (e) => {
      if (htmlRoot.classList.contains('system-theme')) {
        if (e.matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
    };

    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    mediaQuery.removeEventListener?.('change', handleSystemThemeChange);
    mediaQuery.addEventListener('change', handleSystemThemeChange);

    const handleToggleClick = () => {
      const currentTheme = localStorage.getItem('theme') || 'system';
      let nextTheme;
      if (currentTheme === 'light') nextTheme = 'dark';
      else if (currentTheme === 'dark') nextTheme = 'system';
      else nextTheme = 'light';
      setTheme(nextTheme, false);
    };

    themeToggle?.removeEventListener('click', handleToggleClick);
    themeToggle?.addEventListener('click', handleToggleClick);

    setTheme(getTheme(), true);
  }

  document.addEventListener('astro:page-load', initThemeToggle);
  document.addEventListener('astro:after-swap', initThemeToggle);
}

lt;code&gt;comments.replyTo&lt;/code&gt; 字段，其余字段保持不变；修改时只需要添加新的字段即可&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;v26317\&quot;&gt;v26.3.17&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;修改评论头像的样式为圆形&lt;/li&gt;\n&lt;li&gt;调整部分组件的边距&lt;/li&gt;\n&lt;li&gt;本次更新对配置文件 &lt;code&gt;src/i18n/&lt;/code&gt; 进行了修改，增加了&lt;code&gt;themeInfo&lt;/code&gt; 字段，其余字段保持不变；修改时只需要添加新的字段即可&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;v26311\&quot;&gt;v26.3.11&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;首次发布版本号 &lt;code&gt;v26.3.11&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;对项目多处进行修改，包括：优化移动端体验、对网站色彩进行统一&lt;/li&gt;\n&lt;li&gt;本次更新对配置文件 &lt;code&gt;src/i18n/&lt;/code&gt; 进行了修改，建议使用最新的版本，然后修改 &lt;code&gt;cover.title&lt;/code&gt; 和 &lt;code&gt;cover.subtitle&lt;/code&gt; 字段为自己的信息&lt;/li&gt;\n&lt;/ul&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;版本号未变&quot;],&quot;text&quot;:[0,&quot;版本号未变&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;版本号改变&quot;],&quot;text&quot;:[0,&quot;版本号改变&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;版本信息&quot;],&quot;text&quot;:[0,&quot;版本信息&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26329&quot;],&quot;text&quot;:[0,&quot;v26.3.29&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26317&quot;],&quot;text&quot;:[0,&quot;v26.3.17&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26311&quot;],&quot;text&quot;:[0,&quot;v26.3.11&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;更新指南和版本记录&quot;],&quot;pubDate&quot;:[3,&quot;2026-03-11T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;category&quot;:[0,&quot;指南&quot;],&quot;image&quot;:[0,&quot;./images/banner.png&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;blog/intro/release&quot;],&quot;minutes&quot;:[0,3],&quot;words&quot;:[0,617]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;test/special&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;测试自定义样式&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-12T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;文章功能测试&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/test/special&quot;],&quot;category&quot;:[0,&quot;测试&quot;]}],&quot;body&quot;:[0,&quot;## 引用测试\n\n### 普通文本\n\n:::quote\n\n宇宙就是一座黑暗森林，每个文明都是带枪的猎人，像幽灵般潜行于林间，轻轻拨开挡路的树枝，竭力不让脚步发出一点儿声音，连呼吸都必须小心翼翼：他必须小心，因为林中到处都有与他一样潜行的猎人，如果他发现了别的生命，能做的只有一件事：开枪消灭之。\n\n&lt;br&gt;&lt;right&gt;——《三体 II：黑暗森林》&lt;/right&gt;\n:::\n\n### 数学公式\n\n:::quote\n$E = mc^2$\n:::\n\n## 卡片测试\n\n### 音乐卡片\n\n::music{id=\&quot;30431366\&quot;}\n\n### Github 卡片\n\n::github{repo=\&quot;Motues/Momo\&quot;}\n\n## 特殊语法\n\n### 模糊效果\n\n这是一个!!模糊!!效果。\n\n对于桌面端，鼠标移入时，会移除模糊效果，点击后会保持3秒清晰显示；对于移动设备，点击后移除模糊效果，当同时满足点击后超过3秒和页面滑动才会变为模糊状态。\n\n### 拼音\n\n下面的词会显示拼音：\n\n{拼音}(pīn|yīn)，{君の名は}(きみ||な|)\n\n### 彩虹文字\n\n这是一个==彩虹==文字效果。\n\n### 嵌套效果\n\n上面的样式是可以进行嵌套的，比如：\n\n这是一个!!==模糊并且带{拼音}(pīn|yīn)的{彩虹}(cǎi|hóng)==!!\n\n## Typst 测试\n\n基于 [Typst.ts](https://myriad-dreamin.github.io/typst.ts/) 实现的 Typst 渲染。\n\n图片在黑暗模式情况的效果可能不是很好。\n\n```typst\n#set page(width: auto, height: auto, margin: 10pt)\n#set text(fill: rgb(\&quot;#2f61eb\&quot;), size: 20pt)\n\n$ cal(A) = pi r^2 $\n\nHello from *Typst*!\n```\n\n```typst *Waves*\n// Code from https://github.com/typst/packages/blob/main/packages/preview/cetz/0.4.2/gallery/waves.typ\n#import \&quot;@preview/cetz:0.4.2\&quot;: canvas, draw, vector, matrix\n\n#set page(width: auto, height: auto, margin: .5cm)\n\n#canvas({\n  import draw: *\n\n  ortho(y: -30deg, x: 30deg, {\n    on-xz({\n      grid((0,-2), (8,2), stroke: gray + .5pt)\n    })\n\n    // Draw a sine wave on the xy plane\n    let wave(amplitude: 1, fill: none, phases: 2, scale: 8, samples: 100) = {\n      line(..(for x in range(0, samples + 1) {\n        let x = x / samples\n        let p = (2 * phases * calc.pi) * x\n        ((x * scale, calc.sin(p) * amplitude),)\n      }), fill: fill)\n\n      let subdivs = 8\n      for phase in range(0, phases) {\n        let x = phase / phases\n        for div in range(1, subdivs + 1) {\n          let p = 2 * calc.pi * (div / subdivs)\n          let y = calc.sin(p) * amplitude\n          let x = x * scale + div / subdivs * scale / phases\n          line((x, 0), (x, y), stroke: rgb(0, 0, 0, 150) + .5pt)\n        }\n      }\n    }\n\n    on-xy({\n      wave(amplitude: 1.6, fill: rgb(84, 219, 219, 80))\n    })\n    on-xz({\n      wave(amplitude: 1, fill: rgb(216, 219, 90, 80))\n    })\n  })\n})\n```\n\n## Alert 组件测试\n\n### 单行内容测试\n\n:::note\n这是一个提示。\n:::\n\n:::tip\n这是一个建议。\n:::\n\n:::important\n这是一个重要事项。\n:::\n\n:::warning\n这是一个警告。\n:::\n\n:::caution\n这是一个危险事项。\n:::\n\n\n### 多行内容测试\n\n:::tip\n这是一个包含多行内容的提示框。\n\n- 支持列表项\n- 可以包含多个段落\n\n**重点内容**：还可以包含粗体文字和其他 Markdown 元素。\n:::\n\n### 嵌套内容测试\n\n:::warning\n提示框内可以包含代码块等其他元素。\n\n```javascript\nconsole.log(&#39;Hello World&#39;);\n```\n:::\n\n### 自定义标题测试\n\n:::important[自定义标题]\n这是一个带有自定义标题的提示框。标题会显示为“自定义标题”而不是默认的“IMPORTANT”。\n:::&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/test/special/zh-cn.md&quot;],&quot;digest&quot;:[0,&quot;b82ec37c6d341eb4&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;引用测试\&quot;&gt;引用测试&lt;/h2&gt;\n&lt;h3 id=\&quot;普通文本\&quot;&gt;普通文本&lt;/h3&gt;\n&lt;div class=\&quot;quote\&quot;&gt;宇宙就是一座黑暗森林，每个文明都是带枪的猎人，像幽灵般潜行于林间，轻轻拨开挡路的树枝，竭力不让脚步发出一点儿声音，连呼吸都必须小心翼翼：他必须小心，因为林中到处都有与他一样潜行的猎人，如果他发现了别的生命，能做的只有一件事：开枪消灭之。&lt;br&gt;&lt;br&gt;&lt;right&gt;——《三体 II：黑暗森林》&lt;/right&gt;&lt;/div&gt;\n&lt;h3 id=\&quot;数学公式\&quot;&gt;数学公式&lt;/h3&gt;\n&lt;div class=\&quot;quote\&quot;&gt;&lt;span class=\&quot;katex\&quot;&gt;&lt;span class=\&quot;katex-mathml\&quot;&gt;&lt;math xmlns=\&quot;http://www.w3.org/1998/Math/MathML\&quot;&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mi&gt;m&lt;/mi&gt;&l er noreferrer\&quot;&gt;&lt;div class=\&quot;music-card\&quot;&gt;&lt;div class=\&quot;music-cover-wrapper\&quot; id=\&quot;MC65289b-cover-wrapper\&quot;&gt;&lt;div id=\&quot;MC65289b-cover\&quot; class=\&quot;music-cover\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;music-info\&quot;&gt;&lt;div class=\&quot;music-header\&quot;&gt;&lt;div id=\&quot;MC65289b-title\&quot; class=\&quot;music-title\&quot;&gt;Waiting for API...&lt;/div&gt;&lt;div id=\&quot;MC65289b-artist\&quot; class=\&quot;music-artist\&quot;&gt;Waiting...&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;script id=\&quot;MC65289b-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const initMusicCard = () =&gt; {\n                const card = document.getElementById(&#39;MC65289b-card&#39;);\n                // 幂等性检查：如果卡片不存在，或已经标记为加载完成，则不再执行\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://163api.qijieya.cn/song/detail?ids=30431366&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data &amp;&amp; data.songs &amp;&amp; data.songs.length &gt; 0) {\n                            const song = data.songs[0];\n                            \n                            // 更新标题\n                            const titleEl = document.getElementById(&#39;MC65289b-title&#39;);\n                            if (titleEl) titleEl.innerText = song.name || \&quot;未知曲目\&quot;;\n                            \n                            // 更新艺术家\n                            const artistEl = document.getElementById(&#39;MC65289b-artist&#39;);\n                            const artistName = song.ar ? song.ar.map(a =&gt; a.name).join(&#39;, &#39;) : &#39;未知艺术家&#39;;\n                            if (artistEl) artistEl.innerText = artistName;\n                            \n                            // 更新封面\n                            const coverEl = document.getElementById(&#39;MC65289b-cover&#39;);\n                            if (coverEl &amp;&amp; song.al &amp;&amp; song.al.picUrl) {\n                                coverEl.style.backgroundImage = &#39;url(&#39; + song.al.picUrl + &#39;)&#39;;\n                                coverEl.style.backgroundColor = &#39;transparent&#39;;\n                            }\n\n                            // 移除等待状态并加锁\n                            card.classList.remove(\&quot;fetch-waiting\&quot;);\n                            card.dataset.loaded = \&quot;true\&quot;;\n                            console.log(\&quot;[MUSIC-CARD] Loaded: 30431366\&quot;);\n                        }\n                    })\n                    .catch(err =&gt; {\n                        const cardEl = document.getElementById(&#39;MC65289b-card&#39;);\n                        cardEl?.classList.add(\&quot;fetch-error\&quot;);\n                        console.warn(\&quot;[MUSIC-CARD] Error loading 30431366:\&quot;, err);\n                    });\n            };\n\n            initMusicCard();\n            document.addEventListener(&#39;astro:page-load&#39;, initMusicCard);\n        })();\n        &lt;/script&gt;&lt;/a&gt;\n&lt;h3 id=\&quot;github-卡片\&quot;&gt;Github 卡片&lt;/h3&gt;\n&lt;a id=\&quot;GCnhswwd-card\&quot; class=\&quot;card-github fetch-waiting no-styling\&quot; href=\&quot;https://github.com/Motues/Momo\&quot; target=\&quot;_blank\&quot; data-repo=\&quot;Motues/Momo\&quot;&gt;&lt;div class=\&quot;gc-titlebar\&quot;&gt;&lt;div class=\&quot;gc-titlebar-left\&quot;&gt;&lt;div class=\&quot;gc-owner\&quot;&gt;&lt;div id=\&quot;GCnhswwd-avatar\&quot; class=\&quot;gc-avatar\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;gc-user\&quot;&gt;Motues&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;gc-divider\&quot;&gt;/&lt;/div&gt;&lt;div class=\&quot;gc-repo\&quot;&gt;Momo&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;github-logo\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=\&quot;GCnhswwd-description\&quot; class=\&quot;gc-description\&quot;&gt;Waiting for api.github.com...&lt;/div&gt;&lt;div class=\&quot;gc-infobar\&quot;&gt;&lt;div id=\&quot;GCnhswwd-stars\&quot; class=\&quot;gc-stars\&quot;&gt;00K&lt;/div&gt;&lt;div id=\&quot;GCnhswwd-forks\&quot; class=\&quot;gc-forks\&quot;&gt;0K&lt;/div&gt;&lt;div id=\&quot;GCnhswwd-license\&quot; class=\&quot;gc-license\&quot;&gt;0K&lt;/div&gt;&lt;span id=\&quot;GCnhswwd-language\&quot; class=\&quot;gc-language\&quot;&gt;Waiting...&lt;/span&gt;&lt;/div&gt;&lt;script id=\&quot;GCnhswwd-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const fetchCardData = () =&gt; {\n                const card = document.getElementById(&#39;GCnhswwd-card&#39;);\n                // 如果找不到卡片，或者卡片已经加载过数据，则跳过\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://api.github.com/repos/Motues/Momo&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data.message === \&quot;Not Found\&quot;) throw new Error(\&quot;Repo not found\&quot;);\n                        \n                        document.getElementById(&#39;GCnhswwd-description&#39;).innerText = data.description?.replace(/:[a-zA-Z0-9_]+:/g, &#39;&#39;) || \&quot;Description not set\&quot;;\n                        document.getElementById(&#39;GCnhswwd-language&#39;).innerText = data.language || \&quot;Unknown\&quot;;\n                        \n                        const fmt = Intl.NumberFormat(&#39;en-us&#39;, { notation: \&quot;compact\&quot;, maximumFractionDigits: 1 });\n                        document.getElementById(&#39;GCnhswwd-forks&#39;).innerText = fmt.format(data.forks).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GCnhswwd-stars&#39;).innerText = fmt.format(data.stargazers_count).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GCnhswwd-license&#39;).innerText = data.license?.spdx_id || \&quot;No License\&quot;;\n\n                        const avatarEl = document.getElementById(&#39;GCnhswwd-avatar&#39;);\n                        avatarEl.style.backgroundImage = &#39;url(&#39; + data.owner.avatar_url + &#39;)&#39;;\n                        avatarEl.style.backgroundColor = &#39;transparent&#39;;\n\n                        card.classList.remove(\&quot;fetch-waiting\&quot;);\n                        card.dataset.loaded = \&quot;true\&quot;; // 标记加载完成\n                        console.log(\&quot;[GITHUB-CARD] Successfully loaded: Motues/Momo\&quot;);\n                    })\n                    .catch(err =&gt; {\n                        const c = document.getElementById(&#39;GCnhswwd-card&#39;);\n                        c?.classList.add(\&quot;fetch-error\&quot;);\n                        console.warn(\&quot;[GITHUB-CARD] Error loading Motues/Momo:\&quot;, err);\n                    });\n            };\n\n            fetchCardData();\n            document.addEventListener(&#39;astro:page-load&#39;, fetchCardData);\n        })();\n        &lt;/script&gt;&lt;/a&gt;\n&lt;h2 id=\&quot;特殊语法\&quot;&gt;特殊语法&lt;/h2&gt;\n&lt;h3 id=\&quot;模糊效果\&quot;&gt;模糊效果&lt;/h3&gt;\n&lt;p&gt;这是一个&lt;span class=\&quot;spoiler\&quot;&gt;模糊&lt;/span&gt;效果。&lt;/p&gt;\n&lt;p&gt;对于桌面端，鼠标移入时，会移除模糊效果，点击后会保持3秒清晰显示；对于移动设备，点击后移除模糊效果，当同时满足点击后超过3秒和页面滑动才会变为模糊状态。&lt;/p&gt;\n&lt;h3 id=\&quot;拼音\&quot;&gt;拼音&lt;/h3&gt;\n&lt;p&gt;下面的词会显示拼音：&lt;/p&gt;\n&lt;p&gt;&lt;ruby&gt;拼&lt;rt&gt;pīn&lt;/rt&gt;音&lt;rt&gt;yīn&lt;/rt&gt;&lt;/ruby&gt;，&lt;ruby&gt;君&lt;rt&gt;きみ&lt;/rt&gt;の&lt;rt&gt;&lt;/rt&gt;名&lt;rt&gt;な&lt;/rt&gt;は&lt;rt&gt;&lt;/rt&gt;&lt;/ruby&gt;&lt;/p&gt;\n&lt;h3 id=\&quot;彩虹文字\&quot;&gt;彩虹文字&lt;/h3&gt;\n&lt;p&gt;这是一个&lt;span class=\&quot;rainbow-text\&quot;&gt;彩虹&lt;/span&gt;文字效果。&lt;/p&g se]}],[0,{&quot;id&quot;:[0,&quot;intro/comment&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;部署评论系统&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-08T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/comment&quot;],&quot;category&quot;:[0,&quot;指南&quot;]}],&quot;body&quot;:[0,&quot;Momo 支持添加评论功能，并提供两种部署方式，支持零服务器部署。详情访问仓库[Momo-backend](https://github.com/Motues/Momo-Backend)。\n\n::github{repo=\&quot;Motues/Momo-Backend\&quot;}\n\n## 配置\n\n如果需要启用评论功能，需要先部署后端评论系统，具体参考 Momo-backend 仓库。\n\n部署完成后，在 `src/config.ts` 文件中，将 `comments.enable` 设置为 `true`，并填写 `comments.backendUrl` 为后端的URL，即可开启评论功能。\n\n## 运行\n\n评论组件使用 Svelte 编写，参考大部分的评论系统，需要输入昵称和邮箱（用于通知）进行评论，可以选择填写网址。\n\n## 自定义前端\n\n如果需要在其他项目里面使用评论功能可以直接通过 CDN 引入，使用方法如下，具体可以参考仓库[Momo-backend](https://github.com/Motues/Momo-Backend)。\n\n```html\n&lt;div id=\&quot;momo-comment\&quot;&gt;&lt;/div&gt;\n\n&lt;script src=\&quot;https://cdn.jsdelivr.net/npm/@motues/momo-comment@1.1.x/dist/momo-comment.min.js\&quot;&gt;&lt;/script&gt;\n&lt;script&gt;\n    momo.init({\n        el: &#39;#momo-comment&#39;, // 评论容器的 id\n        title: &#39;Test&#39;, // 文章标题\n        slugId: &#39;blog/test&#39;, // 文章的唯一 slugId\n        lang: &#39;zh-cn&#39;, // 语言，目前支持 zh-cn, en\n        apiUrl: &#39;https://api-momo.motues.top&#39; // 后端地址\n    });\n&lt;/script&gt;\n```\n\n&gt; 建议使用版本号锁定版本，避免版本更新导致冲突\n\n评论系统也提供后台管理界面，支持审核和删除评论。\n\n## 自定义样式\n\n目前可以修改评论组件的颜色，后续会推出自定义样式的功能。颜色通过设置全局变量来修改，并且支持黑暗模式。\n\n```css\n:root {\n    --momo-text-color: #d51111;            /* 文字颜色 */\n    --momo-button-border-color: #e5e5e5;   /* 按钮边框颜色 */\n    --momo-button-hover-bg-color: #f5f5f5; /* 按钮背景颜色（hover 状态）*/\n    --momo-link-color: #003b6e;            /* 链接颜色 */\n}\n/* 暗色模式 */\n[data-theme=\&quot;dark\&quot;] { \n    --momo-text-color: #3ad8d8;\n    --momo-button-border-color: #2e2e2e;\n    --momo-button-hover-bg-color: #3c3c3c;\n    --momo-link-color: #fff;\n}\n```&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/comment/zh-cn.md&quot;],&quot;digest&quot;:[0,&quot;cee9210c65964398&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;Momo 支持添加评论功能，并提供两种部署方式，支持零服务器部署。详情访问仓库&lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;。&lt;/p&gt;\n&lt;a id=\&quot;GCsxetpw-card\&quot; class=\&quot;card-github fetch-waiting no-styling\&quot; href=\&quot;https://github.com/Motues/Momo-Backend\&quot; target=\&quot;_blank\&quot; data-repo=\&quot;Motues/Momo-Backend\&quot;&gt;&lt;div class=\&quot;gc-titlebar\&quot;&gt;&lt;div class=\&quot;gc-titlebar-left\&quot;&gt;&lt;div class=\&quot;gc-owner\&quot;&gt;&lt;div id=\&quot;GCsxetpw-avatar\&quot; class=\&quot;gc-avatar\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;gc-user\&quot;&gt;Motues&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;gc-divider\&quot;&gt;/&lt;/div&gt;&lt;div class=\&quot;gc-repo\&quot;&gt;Momo-Backend&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;github-logo\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=\&quot;GCsxetpw-description\&quot; class=\&quot;gc-description\&quot;&gt;Waiting for api.github.com...&lt;/div&gt;&lt;div class=\&quot;gc-infobar\&quot;&gt;&lt;div id=\&quot;GCsxetpw-stars\&quot; class=\&quot;gc-stars\&quot;&gt;00K&lt;/div&gt;&lt;div id=\&quot;GCsxetpw-forks\&quot; class=\&quot;gc-forks\&quot;&gt;0K&lt;/div&gt;&lt;div id=\&quot;GCsxetpw-license\&quot; class=\&quot;gc-license\&quot;&gt;0K&lt;/div&gt;&lt;span id=\&quot;GCsxetpw-language\&quot; class=\&quot;gc-language\&quot;&gt;Waiting...&lt;/span&gt;&lt;/div&gt;&lt;script id=\&quot;GCsxetpw-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const fetchCardData = () =&gt; {\n                const card = document.getElementById(&#39;GCsxetpw-card&#39;);\n                // 如果找不到卡片，或者卡片已经加载过数据，则跳过\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://api.github.com/repos/Motues/Momo-Backend&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data.message === \&quot;Not Found\&quot;) throw new Error(\&quot;Repo not found\&quot;);\n                        \n                        document.getElementById(&#39;GCsxetpw-description&#39;).innerText = data.description?.replace(/:[a-zA-Z0-9_]+:/g, &#39;&#39;) || \&quot;Description not set\&quot;;\n                        document.getElementById(&#39;GCsxetpw-language&#39;).innerText = data.language || \&quot;Unknown\&quot;;\n                        \n                        const fmt = Intl.NumberFormat(&#39;en-us&#39;, { notation: \&quot;compact\&quot;, maximumFractionDigits: 1 });\n                        document.getElementById(&#39;GCsxetpw-forks&#39;).innerText = fmt.format(data.forks).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GCsxetpw-stars&#39;).innerText = fmt.format(data.stargazers_count).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GCsxetpw-license&#39;).innerText = data.license?.spdx_id || \&quot;No License\&quot;;\n\n                        const avatarEl = document.getElementById(&#39;GCsxetpw-avatar&#39;);\n                        avatarEl.style.backgroundImage = &#39;url(&#39; + data.owner.avatar_url + &#39;)&#39;;\n                        avatarEl.style.backgroundColor = &#39;transparent&#39;;\n\n                        card.classList.remove(\&quot;fetch-waiting\&quot;);\n                        card.dataset.loaded = \&quot;true\&quot;; // 标记加载完成\n                        console.log(\&quot;[GITHUB-CARD] Successfully loaded: Motues/Momo-Backend\&quot;);\n                    })\n                    .catch(err =&gt; {\n                        const c = document.getElementById(&#39;GCsxetpw-card&#39;);\n                        c?.classList.add(\&quot;fetch-error\&quot;);\n                        console.warn(\&quot;[GITHUB-CARD] Error loading Motues/Momo-Backend:\&quot;, err);\n                    });\n            };\n\n            fetchCardData();\n            document.addEventListener(&#39;astro:page-load&#39;, fetchCardData);\n        })();\n        &lt;/script&gt;&lt;/a&gt;\n&lt;h2 id=\&quot;配置\&quot;&gt;配置&lt;/h2&gt;\n&lt;p&gt;如果需要启用评论功能，需要先部署后端评论系统，具体参考 Momo-backend 仓库。&lt;/p&gt;\n&lt;p&gt;部署完成后，在 &lt;code&gt;src/config.ts&lt;/code&gt; 文件中，将 &lt;code&gt;comments.enable&lt;/code&gt; 设置为 &lt;code&gt;true&lt;/code&gt;，并填写 &lt;code&gt;comments.backendUrl&lt;/code&gt; 为后端的URL，即可开启评论功能。&lt;/p&gt;\n&lt;h2 id=\&quot;运行\&quot;&gt;运行&lt;/h2&gt;\n&lt;p&gt;评论组件使用 Svelte 编写，参考大部分的评论系统，需要输入昵称和邮箱（用于通知）进行评论，可以选择填写网址。&lt;/p&gt;\n&lt;h2 id=\&quot;自定义前端\&quot;&gt;自定义前端&lt;/h2&gt;\n&lt;p&gt;如果需要在其他项目里面使用评论功能可以直接通过 CDN 引入，使用方法如下，具体可以参考仓库&lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;html\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;div&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; id&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;momo-comment\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;div&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; src&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;https://cdn.jsdelivr.net/npm/@motues/momo-comment@1.1.x/dist/momo-comment.min.js\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;    momo&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;.&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;init&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;({&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        el&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;#momo-comment&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// 评论容器的 id&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        title&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;Test&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// 文章标题&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        slugId&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;blog/test&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// 文章的唯一 slugId&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        lang&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;zh-cn&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// 语言，目前支持 zh-cn, en&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        apiUrl&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;https://api-momo.motues.top&#39;&lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt; // 后端地址&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;    });&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;建议使用版本号锁定版本，避免版本更新导致冲突&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;评论系统也提供后台管理界面，支持审核和删除评论。&lt;/p&gt;\n&lt;h2 id=\&quot;自定义样式\&quot;&gt;自定义样式&lt;/h2&gt;\n&lt;p&gt;目前可以修改评论组件的颜色，后续会推出自定义样式的功能。颜色通过设置全局变量来修改，并且支持黑暗模式。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;css\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#56B6C2\&quot;&gt;:root&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-text-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#d51111&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;            &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* 文字颜色 */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-border-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#e5e5e5&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;   &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* 按钮边框颜色 */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-hover-bg-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#f5f5f5&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;; &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* 按钮背景颜色（hover 状态）*/&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-link-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#003b6e&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;            &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* 链接颜色 */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* 暗色模式 */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;[&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;data-theme&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;dark\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; { &lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-text-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#3ad8d8&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-border-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#2e2e2e&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-hover-bg-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#3c3c3c&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-link-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#fff&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;配置&quot;],&quot;text&quot;:[0,&quot;配置&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;运行&quot;],&quot;text&quot;:[0,&quot;运行&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;自定义前端&quot;],&quot;text&quot;:[0,&quot;自定义前端&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;自定义样式&quot;],&quot;text&quot;:[0,&quot;自定义样式&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;部署评论系统&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-08T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;category&quot;:[0,&quot;指南&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/comment&quot;],&quot;minutes&quot;:[0,2],&quot;words&quot;:[0,384]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;intro/publish-blog&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;文章发布指南&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-29T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/publish&quot;],&quot;category&quot;:[0,&quot;指南&quot;]}],&quot;body&quot;:[0,&quot;## 创建文章文件\n\n首先，在 `src/content/blog/` 目录下创建一个新的文件夹。您可以直接在该目录下创建，也可以在子目录中创建新的文件夹。\n\n例如，创建一篇名为 `src/content/blog/my-first-post/` 的文件夹，或在子目录中创建`src/content/blog/posts/my-first-post/`；编写的文章最后会根据文件的相对路径（相对于 `src/content/`）发布到对应的路由上，比如`/blog/my-first-post`。\n\n为了使用国际化，对于不同语言的文章，请使用 `&lt;language&gt;.md` 问价进行区分，比如`src/content/blog/my-first-post/zh-cn.md`和`src/content/blog/my-first-post/en.md`，分别表示一篇文章的中文和英文版本。\n\n:::important\n* 一定要存在默认的语言版本，在生成页面时，如果当前文章缺少对于语言版本，则使用默认语言版本作为文章内容。\n* 所使用的语言需要在`astro.config.mjs`中配置。\n:::\n\n## 编写文章元数据\n\n每篇文章都需要包含元数据部分（frontmatter），使用 YAML 格式，用 `---` 包围，如下所示：\n\n```yaml\n---\ntitle: 文章标题\npubDate: 2025-01-01\ndescription: 文章简短描述\ncategory: 分类\nimage: \&quot;\&quot;\ndraft: false\nslugId: intro/publish\n---\n```\n\n| 名称 | 作用 | \n| :--- | :--- | \n| `title` | 文章标题 | \n| `pubDate` | 发布时间，格式为 `YYYY-MM-DD` |\n| `description` | 文章描述 |\n| `category` | 分类，不填时，默认为`未分类` |\n| `image` | 封面图片，支持本地图片和外部图片；如果是本地图片，请使用对路径，相对于当前文件，比如`./images/cover.png` |\n| `draft` | 是否草稿，当文章处于草稿状态，发布的时候将不会显示在博客主页 |\n| `slugId` | 文章的ID，用于生成路由，每篇文章必须是唯一的，建议使用文章路径，比如`intro/publish` |\n\n## 编写文章内容\n\n文章内容可以使用 Markdown 格式编写，支持一些特殊语法，具体可以参考其他测试文章。\n\n## 特殊页面\n\n比如介绍页面，保存在 `src/content/spec/about/`文件夹中，和文章的内容类似，支持多种语言，并使用Markdown进行编写，最后会按照Markdown的格式进行渲染，发布到`/about`路由上。&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/publish-blog/zh-cn.md&quot;],&quot;digest&quot;:[0,&quot;4d8c29343093289d&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;创建文章文件\&quot;&gt;创建文章文件&lt;/h2&gt;\n&lt;p&gt;首先，在 &lt;code&gt;src/content/blog/&lt;/code&gt; 目录下创建一个新的文件夹。您可以直接在该目录下创建，也可以在子目录中创建新的文件夹。&lt;/p&gt;\n&lt;p&gt;例如，创建一篇名为 &lt;code&gt;src/content/blog/my-first-post/&lt;/code&gt; 的文件夹，或在子目录中创建&lt;code&gt;src/content/blog/posts/my-first-post/&lt;/code&gt;；编写的文章最后会根据文件的相对路径（相对于 &lt;code&gt;src/content/&lt;/code&gt;）发布到对应的路由上，比如&lt;code&gt;/blog/my-first-post&lt;/code&gt;。&lt;/p&gt;\n&lt;p&gt;为了使用国际化，对于不同语言的文章，请使用 &lt;code&gt;&amp;#x3C;language&gt;.md&lt;/code&gt; 问价进行区分，比如&lt;code&gt;src/content/blog/my-first-post/zh-cn.md&lt;/code&gt;和&lt;code&gt;src/content/blog/my-first-post/en.md&lt;/code&gt;，分别表示一篇文章的中文和英文版本。&lt;/p&gt;\n&lt;div class=\&quot;important\&quot;&gt;&lt;span class=\&quot;admonition-title\&quot;&gt;IMPORTANT&lt;/span&gt;&lt;ul&gt;\n&lt;li&gt;一定要存在默认的语言版本，在生成页面时，如果当前文章缺少对于语言版本，则使用默认语言版本作为文章内容。&lt;/li&gt;\n&lt;li&gt;所使用的语言需要在&lt;code&gt;astro.config.mjs&lt;/code&gt;中配置。&lt;/li&gt;\n&lt;/ul&gt;&lt;/div&gt;\n&lt;h2 id=\&quot;编写文章元数据\&quot;&gt;编写文章元数据&lt;/h2&gt;\n&lt;p&gt;每篇文章都需要包含元数据部分（frontmatter），使用 YAML 格式，用 &lt;code&gt;---&lt;/code&gt; 包围，如下所示：&lt;/p&gt;\n&lt;pre cl ;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th align=\&quot;left\&quot;&gt;名称&lt;/th&gt;&lt;th align=\&quot;left\&quot;&gt;作用&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;title&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;文章标题&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;pubDate&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;发布时间，格式为 &lt;code&gt;YYYY-MM-DD&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;description&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;文章描述&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;category&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;分类，不填时，默认为&lt;code&gt;未分类&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;image&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;封面图片，支持本地图片和外部图片；如果是本地图片，请使用对路径，相对于当前文件，比如&lt;code&gt;./images/cover.png&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;draft&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;是否草稿，当文章处于草稿状态，发布的时候将不会显示在博客主页&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;slugId&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;文章的ID，用于生成路由，每篇文章必须是唯一的，建议使用文章路径，比如&lt;code&gt;intro/publish&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h2 id=\&quot;编写文章内容\&quot;&gt;编写文章内容&lt;/h2&gt;\n&lt;p&gt;文章内容可以使用 Markdown 格式编写，支持一些特殊语法，具体可以参考其他测试文章。&lt;/p&gt;\n&lt;h2 id=\&quot;特殊页面\&quot;&gt;特殊页面&lt;/h2&gt;\n&lt;p&gt;比如介绍页面，保存在 &lt;code&gt;src/content/spec/about/&lt;/code&gt;文件夹中，和文章的内容类似，支持多种语言，并使用Markdown进行编写，最后会按照Markdown的格式进行渲染，发布到&lt;code&gt;/about&lt;/code&gt;路由上。&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;创建文章文件&quot;],&quot;text&quot;:[0,&quot;创建文章文件&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;编写文章元数据&quot;],&quot;text&quot;:[0,&quot;编写文章元数据&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;编写文章内容&quot;],&quot;text&quot;:[0,&quot;编写文章内容&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;特殊页面&quot;],&quot;text&quot;:[0,&quot;特殊页面&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;文章发布指南&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-29T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;category&quot;:[0,&quot;指南&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/publish&quot;],&quot;minutes&quot;:[0,3],&quot;words&quot;:[0,501]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;intro/config&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Momo 配置指南&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-28T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/config&quot;],&quot;category&quot;:[0,&quot;指南&quot;]}],&quot;body&quot;:[0,&quot;## 网站信息配置\n\n网站的配置文件主要为`astro.config.mjs`和`src/config.ts`\n\n### `astro.config.mjs`\n\n* `site`: 网站的URL\n* `i18n`: 国际化配置\n    * `locale`: 支持的语言\n    * `defaultLocale`: 默认语言\n* `markdown`\n    * `shikiConfig`: 代码块的样式，可以参考Astro的文档[Shiki](https://docs.astro.build/en/guides/syntax-highlighting/#setting-a-default-shiki-theme)\n\n### `src/config.ts`\n\n#### `siteConfig`\n\n* `title`: 网站的标题\n* `subTitle`: 网站的副标题\n* `favicon`: 网站的图标\n* `pageSize`: 每页显示的文章数量\n* `toc`\n    * `enable`: 是否启用目录\n    * `depth`: 目录的深度\n* `comments`\n    * `enable`: 是否启用评论功能\n    * `backendUrl`： 后端的地址\n\n:::tip\n后端项目参考[Momo-backend](https://github.com/Motues/Momo-Backend)进行部署，一定需要按照要求进行配置，尤其是跨域的域名认证\n:::\n\n#### `profileConfig`\n\n* `avatar`: 头像\n* `name`: 名字\n* `description`: 描述\n* `indexpage`: 个人页面首页\n\n#### `licenseConfig`\n\n* `enable`: 是否启用License，展示在文章的最后\n* `name`: License名称\n* `url`: License的URL\n\n#### `friendLinkConfig`\n\n* `name`: 友链名称\n* `avatar`: 友链图标\n* `url`: 友链URL\n* `description`: 友链描述\n\n## 国际化配置\n\n国际化配置文件位于 `src/i18n/` 文件夹中\n\n如果需要修改首页或者其他页面的Cover内容，可以在 `src/i18n/language` 文件夹下对应的文件夹修改；只需要修改对应的`cover.title`和`cover.subtitle`字段即可&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/config/zh-cn.md&quot;],&quot;digest&quot;:[0,&quot;194d554a2f098ab4&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;网站信息配置\&quot;&gt;网站信息配置&lt;/h2&gt;\n&lt;p&gt;网站的配置文件主要为&lt;code&gt;astro.config.mjs&lt;/code&gt;和&lt;code&gt;src/config.ts&lt;/code&gt;&lt;/p&gt;\n&lt;h3 id=\&quot;astroconfigmjs\&quot;&gt;&lt;code&gt;astro.config.mjs&lt;/code&gt;&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;site&lt;/code&gt;: 网站的URL&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;i18n&lt;/code&gt;: 国际化配置\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;locale&lt;/code&gt;: 支持的语言&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;defaultLocale&lt;/code&gt;: 默认语言&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;markdown&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;shikiConfig&lt;/code&gt;: 代码块的样式，可以参考Astro的文档&lt;a href=\&quot;https://docs.astro.build/en/guides/syntax-highlighting/#setting-a-default-shiki-theme\&quot;&gt;Shiki&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;srcconfigts\&quot;&gt;&lt;code&gt;src/config.ts&lt;/code&gt;&lt;/h3&gt;\n&lt;h4 id=\&quot;siteconfig\&quot;&gt;&lt;code&gt;siteConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;title&lt;/code&gt;: 网站的标题&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;subTitle&lt;/code&gt;: 网站的副标题&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;favicon&lt;/code&gt;: 网站的图标&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;pageSize&lt;/code&gt;: 每页显示的文章数量&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;toc&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: 是否启用目录&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;depth&lt;/code&gt;: 目录的深度&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;comments&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: 是否启用评论功能&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;backendUrl&lt;/code&gt;： 后端的地址&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\&quot;tip\&quot;&gt;&lt;span class=\&quot;admonition-title\&quot;&gt;TIP&lt;/span&gt;&lt;p&gt;后端项目参考&lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;进行部署，一定需要按照要求进行配置，尤其是跨域的域名认证&lt;/p&gt;&lt;/div&gt;\n&lt;h4 id=\&quot;profileconfig\&quot;&gt;&lt;code&gt;profileConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;avatar&lt;/code&gt;: 头像&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: 名字&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;description&lt;/code&gt;: 描述&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;indexpage&lt;/code&gt;: 个人页面首页&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&quot;licenseconfig\&quot;&gt;&lt;code&gt;licenseConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: 是否启用License，展示在文章的最后&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: License名称&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;url&lt;/code&gt;: License的URL&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&quot;friendlinkconfig\&quot;&gt;&lt;code&gt;friendLinkConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: 友链名称&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;avatar&lt;/code&gt;: 友链图标&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;url&lt;/code&gt;: 友链URL&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;description&lt;/code&gt;: 友链描述&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;国际化配置\&quot;&gt;国际化配置&lt;/h2&gt;\n&lt;p&gt;国际化配置文件位于 &lt;code&gt;src/i18n/&lt;/code&gt; 文件夹中&lt;/p&gt;\n&lt;p&gt;如果需要修改首页或者其他页面的Cover内容，可以在 &lt;code&gt;src/i18n/language&lt;/code&gt; 文件夹下对应的文件夹修改；只需要修改对应的&lt;code&gt;cover.title&lt;/code&gt;和&lt;code&gt;cover.subtitle&lt;/code&gt;字段即可&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;网站信息配置&quot;],&quot;text&quot;:[0,&quot;网站信息配置&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;astroconfigmjs&quot;],&quot;text&quot;:[0,&quot;astro.config.mjs&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;srcconfigts&quot;],&quot;text&quot;:[0,&quot;src/config.ts&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;siteconfig&quot;],&quot;text&quot;:[0,&quot;siteConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;profileconfig&quot;],&quot;text&quot;:[0,&quot;profileConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;licenseconfig&quot;],&quot;text&quot;:[0,&quot;licenseConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;friendlinkconfig&quot;],&quot;text&quot;:[0,&quot;friendLinkConfig&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;国际化配置&quot;],&quot;text&quot;:[0,&quot;国际化配置&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Momo 配置指南&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-28T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;网站配置&quot;],&quot;category&quot;:[0,&quot;指南&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/config&quot;],&quot;minutes&quot;:[0,1],&quot;words&quot;:[0,267]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;markdown&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Markdown&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-21T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;测试Markdown的基本功能&quot;],&quot;image&quot;:[0,&quot;./cover.jpg&quot;],&quot;slugId&quot;:[0,&quot;momo/markdown&quot;]}],&quot;body&quot;:[0,&quot;## 标题\n\n一般来使用1-6个井号`#`来表示标题，例如：\n\n```markdown\n# 这是一级标题\n\n## 这是二级标题\n\n### 这是三级标题\n\n#### 这是四级标题\n\n#### 这是五级标题\n```\n\n显示如下：\n![heading](./heading_zh.png)\n\n## 段落\n\n### 段落\n\n段落之间用空行开，段落前不使用空格或者缩进。\n\n```markdown\n这是第一段\n\n这是第二段\n```\n\n### 换行\n\n在行尾添加两个及以上的空格表示换行。\n\n```markdown\n这是第一行  \n这是第二行\n```\n\n## 着重\n\n### 粗体\n\n在单词或短语的前后添加两个星号`**`或下划线`__`表示加粗。\n\n```markdown\n我喜欢**听歌**、**旅游**......\n```\n\n显示如下:  \n我喜欢**听歌**、**旅游**......\n\n### 斜体\n\n在单词或短语的前后添加一个星号`*`或下划线`_`表示斜体。\n\n```markdown\n我喜欢*听歌*、_旅游_......\n```\n\n显示如下:  \n我喜欢*听歌*、_旅游_......\n\n### 粗体和斜体\n\n在单词或短语的前后添加三个星号`***`**或**下划线`___`表示同时为粗体和斜体。\n\n```markdown\n我喜欢**_听歌_**、**_旅游_**......\n```\n\n显示如下:  \n我喜欢**_听歌_**、**_旅游_**......\n\n## 块引用\n\n### 块引用\n\n将单词或短语用右箭头`&gt;`开头表示为块引用，需要用空格隔开。\n\n```markdown\n&gt; 念念不忘，必有回响！\n```\n\n显示如下:\n\n&gt; 念念不忘，必有回响！\n\n### 嵌套块引用\n\n在段落前面添加一个双右箭头`&gt;&gt;`表示嵌套引用。\n\n```markdown\n&gt; 念念不忘\n&gt;\n&gt; &gt; 必有回响\n```\n\n显示如下:\n\n&gt; 念念不忘\n&gt;\n&gt; &gt; 必有回响\n\n## 代码\n\n### 代码\n\n将单词或者短语用勾号\\`括起来表示为代码。\n\n```\n在C++中，使用`cout`打印Hello World!\n```\n\n显示如下  \n在C++中，使用`cout`打印Hello World!\n\n### 代码块\n\n代码块之前和之后的行上使用三个刻度线（```）或三个波浪号（~~~），并在第一行后面加入语言类型实现语法高亮。\n\n````\n```c++\n#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n  cout&lt;&lt;\&quot;Hello World!\&quot;&lt;&lt;endl;\n  return 0;\n}\n```\n````\n\n结果如下所示\n\n```cpp\n#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n  cout&lt;&lt;\&quot;Hello World!\&quot;&lt;&lt;endl;\n  return 0;\n}\n```\n\n## 列表\n\n### 有序列表\n\n在段落前中添加数字和句点`.`表示有序列表。数字不必按数字顺序排列，但列表以数字开头显示。\n\n```markdown\n1. 第一项\n1. 第二项\n1. 第三项\n```\n\n显示如下:\n\n1. 第一项\n2. 第二项\n3. 第三项\n\n### 无序列表\n\n在段落前添加一个星号`*`或减号`-`或圆点`.`表示无序列表。\n\n```markdown\n- 第一项\n\n* 第二项\n  . 第三项\n```\n\n显示如下:\n\n- 第一项\n- 第二项\n- 第三项\n\n### 在列表中添加元素\n\n在列表中添加另一个元素（段落、块引用等），需要把该元素缩进四个空格或一个制表符。\n\n```markdown\n1. 第一项\n   &gt; 早睡早起\n2. 第二项\n```\n\n显示如下:\n\n1. 第一项\n   &gt; 早睡早起\n2. 第二项\n\n## 链接\n\n### 链接\n\n将文本括在方括号（例如[Motues]）中，然后在后面的括号加入URL表示链接。\n\n```markdown\n欢迎访问Motues的[Blog](https://motues.top)！\n```\n\n显示如下:  \n欢迎访问Motues的[Blog](https://motues.top)！\n\n### 链接标题\n\n在URL后面的括号中添加标题，当用户将鼠标悬停在链接上时，这将显示提示。\n\n```markdown\n欢迎访问Motues的[Blog](https://motues.top \&quot;Motues&#39;s Blog\&quot;)！\n```\n\n显示如下:  \n欢迎访问Motues的[Blog](https://motues.top \&quot;Motues&#39;s Blog\&quot;)！\n\n## 图片\n\n先感叹号（!），然后在括号中添加替代文本，并在括号中添加图像资源的路径或URL，也可以选择在括号中的URL之后添加标题，标题会显示在图片下方。\n\n```markdown\n![Motues](./Motues.png \&quot;这是我的头像\&quot;)\n```\n\n显示如下:  \n![Motues](./Motues.png \&quot;这是我的头像\&quot;)\n&lt;!-- &lt;img src=\&quot;./Motues.png\&quot; alt=\&quot;Motues\&quot; title=\&quot;这是我的头像\&quot; width=\&quot;256\&quot; height=\&quot;256\&quot;&gt; --&gt;\n\n## 表格\n\n### 表格\n\n要添加表，请使用三个或多个连字符（`---`）创建每列的标题，并使用竖线（`|`）分隔每列（每行每列不需要对齐）。\n\n```markdown\n| 水果   | 颜色 | 口感 |\n| ------ | ---- | ---- |\n| 西瓜🍉 | 绿色 | 甜   |\n| 葡萄🍇 | 紫色 | 酸   |\n```\n\n显示如下:\n| 水果 | 颜色 | 口感 |\n| ---------- | ---------| ----|\n| 西瓜🍉 | 绿色 | 甜 |\n| 葡萄🍇 | 紫色 | 酸 |\n\n### 对齐\n\n可以通过在标题行内的连字符的左侧，右侧或两侧添加一个冒号`:`，以使列中的文本左，右或居中对齐。\n\n```markdown\n| 水果   | 颜色 | 口感 |\n| :----- | :--: | ---: |\n| 西瓜🍉 | 绿色 |   甜 |\n| 葡萄🍇 | 紫色 |   酸 |\n```\n\n显示如下:\n| 水果 | 颜色 | 口感 |\n| :------ | :-----:| ----:|\n| 西瓜🍉 | 绿色 | 甜 |\n| 葡萄🍇 | 紫色 | 酸 |\n\n### 转义字符\n\n使用表格的HTML字符代码`&amp;#124;`在表中显示竖线`|`字符\n\n## 任务清单\n\n任务列表项前需要添加破折号`-`和方括号`[]`，并在之间插入一个空格。如果要选择一个复选框，需要在方括号之间添加`x`。\n\n```markdown\n- [x] 吃饭\n- [ ] 睡觉\n- [ ] 打豆豆\n```\n\n- [x] 吃饭\n- [ ] 睡觉\n- [ ] 打豆豆\n\n## 其他\n\n### 删除线\n\n在单词或短语的前后添加两个波浪线`~~`表示删除线。\n\n```markdown\n我不喜欢吃~~葡萄~~\n```\n\n显示如下:  \n我不喜欢吃~~葡萄~~\n\n### 水平线\n\n在一行上使用三个或更多的星号（`***`），减号（`---`）或下划线（`___`）创建水平线。\n\n```markdown\n---\n---\n\n---\n```\n\n显示如下:\n\n---\n\n---\n\n---&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/markdown/zh-cn.md&quot;],&quot;assetImports&quot;:[1,[[0,&quot;./heading_zh.png&quot;],[0,&quot;./Motues.png&quot;]]],&quot;digest&quot;:[0,&quot;3a4a97a683d3b117&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;标题\&quot;&gt;标题&lt;/h2&gt;\n&lt;p&gt;一般来使用1-6个井号&lt;code&gt;#&lt;/code&gt;来表示标题，例如：&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;# 这是一级标题&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;## 这是二级标题&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;### 这是三级标题&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;#### 这是四级标题&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;#### 这是五级标题&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下：\n&lt;/p&gt;&lt;figure style=\&quot;text-align: center;\&quot;&gt;&lt;img __ASTRO_IMAGE_=\&quot;{&amp;#x22;src&amp;#x22;:&amp;#x22;./heading_zh.png&amp;#x22;,&amp;#x22;alt&amp;#x22;:&amp;#x22;heading&amp;#x22;,&amp;#x22;index&amp;#x22;:0}\&quot;&gt;&lt;/figure&gt;&lt;p&gt;&lt;/p&gt;\n&lt;h2 id=\&quot;段落\&quot;&gt;段落&lt;/h2&gt;\n&lt;h3 id=\&quot;段落-1\&quot;&gt;段落&lt;/h3&gt;\n&lt;p&gt;段落之间用空行开，段落前不使用空格或者缩进。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;这是第一段&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;这是第二段&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&quot;换行\&quot;&gt;换行&lt;/h3&gt;\n&lt;p&gt;在行尾添加两个及以上的空格表示换行。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;这是第一行  &lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;这是第二行&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&quot;着重\&quot;&gt;着重&lt;/h2&gt;\n&lt;h3 id=\&quot;粗体\&quot;&gt;粗体&lt;/h3&gt;\n&lt;p&gt;在单词或短语的前后添加两个星号&lt;code&gt;**&lt;/code&gt;或下划线&lt;code&gt;__&lt;/code&gt;表示加粗。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;我喜欢&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**听歌**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;、&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**旅游**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;......&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n我喜欢&lt;strong&gt;听歌&lt;/strong&gt;、&lt;strong&gt;旅游&lt;/strong&gt;…&lt;/p&gt;\n&lt;h3 id=\&quot;斜体\&quot;&gt;斜体&lt;/h3&gt;\n&lt;p&gt;在单词或短语的前后添加一个星号&lt;code&gt;*&lt;/code&gt;或下划线&lt;code&gt;_&lt;/code&gt;表示斜体。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;我喜欢&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;*听歌*&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;、&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_旅游_&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;......&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n我喜欢&lt;em&gt;听歌&lt;/em&gt;、&lt;em&gt;旅游&lt;/em&gt;…&lt;/p&gt;\n&lt;h3 id=\&quot;粗体和斜体\&quot;&gt;粗体和斜体&lt;/h3&gt;\n&lt;p&gt;在单词或短语的前后添加三个星号&lt;code&gt;***&lt;/code&gt;&lt;strong&gt;或&lt;/strong&gt;下划线&lt;code&gt;___&lt;/code&gt;表示同时为粗体和斜体。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;我喜欢&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_听歌_&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;、&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_旅游_&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;......&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n我喜欢&lt;strong&gt;&lt;em&gt;听歌&lt;/em&gt;&lt;/strong&gt;、&lt;strong&gt;&lt;em&gt;旅游&lt;/em&gt;&lt;/strong&gt;…&lt;/p&gt;\n&lt;h2 id=\&quot;块引用\&quot;&gt;块引用&lt;/h2&gt;\n&lt;h3 id=\&quot;块引用-1\&quot;&gt;块引用&lt;/h3&gt;\n&lt;p&gt;将单词或短语用右箭头&lt;code&gt;&gt;&lt;/code&gt;开头表示为块引用，需要用空格隔开。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; 念念不忘，必有回响！&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;念念不忘，必有回响！&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&quot;嵌套块引用\&quot;&gt;嵌套块引用&lt;/h3&gt;\n&lt;p&gt;在段落前面添加一个双右箭头&lt;code&gt;&gt;&gt;&lt;/code&gt;表示嵌套引用。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; 念念不忘&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; &gt; 必有回响&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;念念不忘&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;必有回响&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\&quot;代码\&quot;&gt;代码&lt;/h2&gt;\n&lt;h3 id=\&quot;代码-1\&quot;&gt;代码&lt;/h3&gt;\n&lt;p&gt;将单词或者短语用勾号`括起来表示为代码。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;plaintext\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;在C++中，使用`cout`打印Hello World!&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下&lt;br&gt;\n在C++中，使用&lt;code&gt;cout&lt;/code&gt;打印Hello World!&lt;/p&gt;\n&lt;h3 id=\&quot;代码块\&quot;&gt;代码块&lt;/h3&gt;\n&lt;p&gt;代码块之前和之后的行上使用三个刻度线（```）或三个波浪号（~~~），并在第一行后面加入语言类型实现语法高亮。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;plaintext\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;```c++&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;#include &amp;#x3C;iostream&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;using namespace std;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;int main() {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;  cout&amp;#x3C;&amp;#x3C;\&quot;Hello World!\&quot;&amp;#x3C;&amp;#x3C;endl;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;  return 0;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;}&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;```&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;结果如下所示&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;cpp\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;#include&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt; &amp;#x3C;iostream&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;using&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt; namespace&lt;/span&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt; std&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;int&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt; main&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;() {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;  cout&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;&amp;#x3C;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;Hello World!\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;&amp;#x3C;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;endl;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;  return&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; 0&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&quot;列表\&quot;&gt;列表&lt;/h2&gt;\n&lt;h3 id=\&quot;有序列表\&quot;&gt;有序列表&lt;/h3&gt;\n&lt;p&gt;在段落前中添加数字和句点&lt;code&gt;.&lt;/code&gt;表示有序列表。数字不必按数字顺序排列，但列表以数字开头显示。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第一项&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第二项&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第三项&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;第一项&lt;/li&gt;\n&lt;li&gt;第二项&lt;/li&gt;\n&lt;li&gt;第三项&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\&quot;无序列表\&quot;&gt;无序列表&lt;/h3&gt;\n&lt;p&gt;在段落前添加一个星号&lt;code&gt;*&lt;/code&gt;或减号&lt;code&gt;-&lt;/code&gt;或圆点&lt;code&gt;.&lt;/code&gt;表示无序列表。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第一项&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;*&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第二项&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;  . 第三项&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;第一项&lt;/li&gt;\n&lt;li&gt;第二项&lt;/li&gt;\n&lt;li&gt;第三项&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;在列表中添加元素\&quot;&gt;在列表中添加元素&lt;/h3&gt;\n&lt;p&gt;在列表中添加另一个元素（段落、块引用等），需要把该元素缩进四个空格或一个制表符。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第一项&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;   &gt; 早睡早起&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;2.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; 第二项&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;第一项\n&lt;blockquote&gt;\n&lt;p&gt;早睡早起&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/li&gt;\n&lt;li&gt;第二项&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&quot;链接\&quot;&gt;链接&lt;/h2&gt;\n&lt;h3 id=\&quot;链接-1\&quot;&gt;链接&lt;/h3&gt;\n&lt;p&gt;将文本括在方括号（例如[Motues]）中，然后在后面的括号加入URL表示链接。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;欢迎访问Motues的[&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Blog&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;(&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;text-decoration:underline\&quot;&gt;https://motues.top&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;)&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;！&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n欢迎访问Motues的&lt;a href=\&quot;https://motues.top\&quot;&gt;Blog&lt;/a&gt;！&lt;/p&gt;\n&lt;h3 id=\&quot;链接标题\&quot;&gt;链接标题&lt;/h3&gt;\n&lt;p&gt;在URL后面的括号中添加标题，当用户将鼠标悬停在链接上时，这将显示提示。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;欢迎访问Motues的[&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Blog&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;(&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;text-decoration:underline\&quot;&gt;https://motues.top&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt; \&quot;&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;Motues&#39;s Blog&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;)&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;！&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n欢迎访问Motues的&lt;a href=\&quot;https://motues.top\&quot; title=\&quot;Motues&amp;#x27;s Blog\&quot;&gt;Blog&lt;/a&gt;！&lt;/p&gt;\n&lt;h2 id=\&quot;图片\&quot;&gt;图片&lt;/h2&gt;\n&lt;p&gt;先感叹号（!），然后在括号中添加替代文本，并在括号中添加图像资源的路径或URL，也可以选择在括号中的URL之后添加标题，标题会显示在图片下方。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;![&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Motues&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;(&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;text-decoration:underline\&quot;&gt;./Motues.png&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt; \&quot;&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;这是我的头像&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n&lt;/p&gt;&lt;figure style=\&quot;text-align: center;\&quot;&gt;&lt;img __ASTRO_IMAGE_=\&quot;{&amp;#x22;src&amp;#x22;:&amp;#x22;./Motues.png&amp;#x22;,&amp;#x22;alt&amp;#x22;:&amp;#x22;Motues&amp;#x22;,&amp;#x22;title&amp;#x22;:&amp;#x22;这是我的头像&amp;#x22;,&amp;#x22;index&amp;#x22;:0}\&quot;&gt;&lt;figcaption class=\&quot;text-center text-sm text-[var(--text-color-70)]\&quot;&gt;这是我的头像&lt;/figcaption&gt;&lt;/figure&gt;&lt;p&gt;&lt;/p&gt;\n&lt;!-- &lt;img src=\&quot;./Motues.png\&quot; alt=\&quot;Motues\&quot; title=\&quot;这是我的头像\&quot; width=\&quot;256\&quot; height=\&quot;256\&quot;&gt; --&gt;\n&lt;h2 id=\&quot;表格\&quot;&gt;表格&lt;/h2&gt;\n&lt;h3 id=\&quot;表格-1\&quot;&gt;表格&lt;/h3&gt;\n&lt;p&gt;要添加表，请使用三个或多个连字符（&lt;code&gt;---&lt;/code&gt;）创建每列的标题，并使用竖线（&lt;code&gt;|&lt;/code&gt;）分隔每列（每行每列不需要对齐）。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 水果   | 颜色 | 口感 |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| ------ | ---- | ---- |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 西瓜🍉 | 绿色 | 甜   |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 葡萄🍇 | 紫色 | 酸   |&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;水果&lt;/th&gt;&lt;th&gt;颜色&lt;/th&gt;&lt;th&gt;口感&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td&gt;西瓜🍉&lt;/td&gt;&lt;td&gt;绿色&lt;/td&gt;&lt;td&gt;甜&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;葡萄🍇&lt;/td&gt;&lt;td&gt;紫色&lt;/td&gt;&lt;td&gt;酸&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3 id=\&quot;对齐\&quot;&gt;对齐&lt;/h3&gt;\n&lt;p&gt;可以通过在标题行内的连字符的左侧，右侧或两侧添加一个冒号&lt;code&gt;:&lt;/code&gt;，以使列中的文本左，右或居中对齐。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 水果   | 颜色 | 口感 |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| :----- | :--: | ---: |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 西瓜🍉 | 绿色 |   甜 |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| 葡萄🍇 | 紫色 |   酸 |&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th align=\&quot;left\&quot;&gt;水果&lt;/th&gt;&lt;th align=\&quot;center\&quot;&gt;颜色&lt;/th&gt;&lt;th align=\&quot;right\&quot;&gt;口感&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;西瓜🍉&lt;/td&gt;&lt;td align=\&quot;center\&quot;&gt;绿色&lt;/td&gt;&lt;td align=\&quot;right\&quot;&gt;甜&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;葡萄🍇&lt;/td&gt;&lt;td align=\&quot;center\&quot;&gt;紫色&lt;/td&gt;&lt;td align=\&quot;right\&quot;&gt;酸&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3 id=\&quot;转义字符\&quot;&gt;转义字符&lt;/h3&gt;\n&lt;p&gt;使用表格的HTML字符代码&lt;code&gt;&amp;#x26;#124;&lt;/code&gt;在表中显示竖线&lt;code&gt;|&lt;/code&gt;字符&lt;/p&gt;\n&lt;h2 id=\&quot;任务清单\&quot;&gt;任务清单&lt;/h2&gt;\n&lt;p&gt;任务列表项前需要添加破折号&lt;code&gt;-&lt;/code&gt;和方括号&lt;code&gt;[]&lt;/code&gt;，并在之间插入一个空格。如果要选择一个复选框，需要在方括号之间添加&lt;code&gt;x&lt;/code&gt;。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;x&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;] 吃饭&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [ ] 睡觉&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [ ] 打豆豆&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;ul class=\&quot;contains-task-list\&quot;&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; checked disabled&gt; 吃饭&lt;/li&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; disabled&gt; 睡觉&lt;/li&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; disabled&gt; 打豆豆&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;其他\&quot;&gt;其他&lt;/h2&gt;\n&lt;h3 id=\&quot;删除线\&quot;&gt;删除线&lt;/h3&gt;\n&lt;p&gt;在单词或短语的前后添加两个波浪线&lt;code&gt;~~&lt;/code&gt;表示删除线。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;我不喜欢吃~~葡萄~~&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;br&gt;\n我不喜欢吃&lt;del&gt;葡萄&lt;/del&gt;&lt;/p&gt;\n&lt;h3 id=\&quot;水平线\&quot;&gt;水平线&lt;/h3&gt;\n&lt;p&gt;在一行上使用三个或更多的星号（&lt;code&gt;***&lt;/code&gt;），减号（&lt;code&gt;---&lt;/code&gt;）或下划线（&lt;code&gt;___&lt;/code&gt;）创建水平线。&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;显示如下:&lt;/p&gt;\n&lt;hr&gt;\n&lt;hr&gt;\n&lt;hr&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;s       const targetElement = document.getElementById(targetId);
