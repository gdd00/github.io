if (typeof window !== 'undefined') {
  
  let toastTimer = null;

  function initThemeToggle() {
    const htmlRoot = document.querySelector('html');
    const themeToggle = document.getElementById('themeToggle');

    const getTheme = () => {
      const localStorageTheme = localStorage?.getItem("theme") ?? '';
      if (['dark', 'light', 'system'].includes(localStorageTheme)) {
        return localStorageTheme;
      }
      return 'system';
    };

    // 从 DOM 属性实时获取翻译
    const translations = {
      light: themeToggle.dataset.tLight,
      dark: themeToggle.dataset.tDark,
      system: themeToggle.dataset.tSystem
    };

    function showThemeToast(themeName) {
      let toast = document.getElementById('theme-toast') || (() => {
        const t = document.createElement('div');
        t.id = 'theme-toast';
        document.body.appendChild(t);
        return t;
      })();

      toast.textContent = translations[themeName] || translations['system'];
      
      clearTimeout(toastTimer);
      toast.classList.remove('show');
      void toast.offsetWidth; 
      toast.classList.add('show');

      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const setTheme = (themeSet, isFirstLoad = false) => { 
      if (themeSet === 'dark') {
        htmlRoot.setAttribute('data-theme', 'dark');
        htmlRoot.classList.remove('system-theme');
      } else if (themeSet === 'light') {
        htmlRoot.removeAttribute('data-theme');
        htmlRoot.classList.remove('system-theme');
      } else {
        htmlRoot.classList.add('system-theme');
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
      window.localStorage.setItem('theme', themeSet);

      // --- 新增：如果不是页面初次加载，则显示弹窗 ---
      if (!isFirstLoad) {
        showThemeToast(themeSet);
      }
    };

    // 系统主题变化监听器
    const handleSystemThemeChange = (e) => {
      if (htmlRoot.classList.contains('system-theme')) {
        if (e.matches) {
          htmlRoot.setAttribute('data-theme', 'dark');
        } else {
          htmlRoot.removeAttribute('data-theme');
        }
      }
    };

    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    mediaQuery.removeEventListener?.('change', handleSystemThemeChange);
    mediaQuery.addEventListener('change', handleSystemThemeChange);

    const handleToggleClick = () => {
      const currentTheme = localStorage.getItem('theme') || 'system';
      let nextTheme;
      if (currentTheme === 'light') nextTheme = 'dark';
      else if (currentTheme === 'dark') nextTheme = 'system';
      else nextTheme = 'light';
      setTheme(nextTheme, false);
    };

    themeToggle?.removeEventListener('click', handleToggleClick);
    themeToggle?.addEventListener('click', handleToggleClick);

    setTheme(getTheme(), true);
  }

  document.addEventListener('astro:page-load', initThemeToggle);
  document.addEventListener('astro:after-swap', initThemeToggle);
}

;:[0,{&quot;title&quot;:[0,&quot;Update Guide and Release&quot;],&quot;pubDate&quot;:[3,&quot;2026-03-11T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;image&quot;:[0,&quot;./images/banner.png&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/release&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;]}],&quot;body&quot;:[0,&quot;This project is currently under active maintenance. To update, follow these steps:\n\nFirst, verify the version number in `package.json` or review the changelog here or at [Release](https://github.com/Motues/Momo/releases).\n\nThe project version number is only incremented when the configuration file structure undergoes structural changes. Project configuration files refer to those related to website layout and content, including `astro.config.mjs`, `src/config.ts`, `src/content.config.ts`, and files within the `src/i18n/` folder.\n\nBlog text, images, and other content are stored in the `src/content/`, `src/assets`, and `public` folders.\n\n## Version Number Unchanged\n\nYou can directly clone this project, then overwrite the new project with your original configuration files. Run `pnpm install` to install dependencies, followed by `pnpm build` for local compilation. Finally, execute `pnpm preview` to preview the compiled project.\n\n## Version Number Changed\n\nWhenever the version number changes, the modification log will be updated here. Refer to the specific log entries to modify the corresponding configuration files.\n\nBelow are general modification suggestions.\n\n* **`astro.config.mjs` Modifications**: Typically just overwrite the file, then update the `site` and `i18n` fields in `siteConfig` with your own information.\n* **`config.ts` Modifications**: Update `config.ts` by adding or modifying configuration items as required.\n* **`content.config.ts` Modifications**: Typically involves adding new frontmatter configurations to articles. Add the required new configuration items to articles as specified.\n* **`src/i18n/` Modifications**: Generally involves adding new internationalization translations. Simply overwrite the files, then ensure to modify the `cover.title` and `cover.subtitle` fields with your own information.\n\n## Version Information\n\n&gt; Version numbers follow the `YY.MM.DD` format\n\n### v26.3.29\n\n* Updated the comment data structure to support the new version of the comment backend\n* Optimized the styling of comments on mobile devices\n* Fixed an issue where the category menu on the archive page was misaligned\n* This update modifies the configuration file `src/i18n/` by adding the `comments.replyTo` field; all other fields remain unchanged. To apply the changes, simply add the new field\n\n### v26.3.17\n\n* Changed the style of comment avatars to circular\n* Adjusted the margins of some components\n* This update modifies the configuration file `src/i18n/` by adding the `themeInfo` field; all other fields remain unchanged. To apply the changes, simply add the new field\n\nTranslated with DeepL.com (free version)\n\n### v26.3.11\n\n* Initial release version `v26.3.11`\n* Multiple project improvements, including: optimized mobile experience, unified website color scheme\n* This update modifies the configuration file `src/i18n/`. We recommend using the latest version and updating the `cover.title` and `cover.subtitle` fields with your own information.&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/release/en.md&quot;],&quot;digest&quot;:[0,&quot;f729cb4213574291&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;This project is currently under active maintenance. To update, follow these steps:&lt;/p&gt;\n&lt;p&gt;First, verify the version number in &lt;code&gt;package.json&lt;/code&gt; or review the changelog here or at &lt;a href=\&quot;https://github.com/Motues/Momo/releases\&quot;&gt;Release&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;The project version number is only incremented when the configuration file structure undergoes structural changes. Project configuration files refer to those related to website layout and content, including &lt;code&gt;astro.config.mjs&lt;/code&gt;, &lt;code&gt;src/config.ts&lt;/code&gt;, &lt;code&gt;src/content.config.ts&lt;/code&gt;, and files within the &lt;code&gt;src/i18n/&lt;/code&gt; folder.&lt;/p&gt;\n&lt;p&gt;Blog text, images, and other content are stored in the &lt;code&gt;src/content/&lt;/code&gt;, &lt;code&gt;src/assets&lt;/code&gt;, and &lt;code&gt;public&lt;/code&gt; folders.&lt;/p&gt;\n&lt;h2 id=\&quot;version-number-unchanged\&quot;&gt;Version Number Unchanged&lt;/h2&gt;\n&lt;p&gt;You can directly clone this project, then overwrite the new project with your original configuration files. Run &lt;code&gt;pnpm install&lt;/code&gt; to install dependencies, followed by &lt;code&gt;pnpm build&lt;/code&gt; for local compilation. Finally, execute &lt;code&gt;pnpm preview&lt;/code&gt; to preview the compiled project.&lt;/p&gt;\n&lt;h2 id=\&quot;version-number-changed\&quot;&gt;Version Number Changed&lt;/h2&gt;\n&lt;p&gt;Whenever the version number changes, the modification log will be updated here. Refer to the specific log entries to modify the corresponding configuration files.&lt;/p&gt;\n&lt;p&gt;Below are general modification suggestions.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;&lt;code&gt;astro.config.mjs&lt;/code&gt; Modifications&lt;/strong&gt;: Typically just overwrite the file, then update the &lt;code&gt;site&lt;/code&gt; and &lt;code&gt;i18n&lt;/code&gt; fields in &lt;code&gt;siteConfig&lt;/code&gt; with your own information.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;&lt;code&gt;config.ts&lt;/code&gt; Modifications&lt;/strong&gt;: Update &lt;code&gt;config.ts&lt;/code&gt; by adding or modifying configuration items as required.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;&lt;code&gt;content.config.ts&lt;/code&gt; Modifications&lt;/strong&gt;: Typically involves adding new frontmatter configurations to articles. Add the required new configuration items to articles as specified.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;&lt;code&gt;src/i18n/&lt;/code&gt; Modifications&lt;/strong&gt;: Generally involves adding new internationalization translations. Simply overwrite the files, then ensure to modify the &lt;code&gt;cover.title&lt;/code&gt; and &lt;code&gt;cover.subtitle&lt;/code&gt; fields with your own information.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;version-information\&quot;&gt;Version Information&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Version numbers follow the &lt;code&gt;YY.MM.DD&lt;/code&gt; format&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&quot;v26329\&quot;&gt;v26.3.29&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Updated the comment data structure to support the new version of the comment backend&lt;/li&gt;\n&lt;li&gt;Optimized the styling of comments on mobile devices&lt;/li&gt;\n&lt;li&gt;Fixed an issue where the category menu on the archive page was misaligned&lt;/li&gt;\n&lt;li&gt;This update modifies the configuration file &lt;code&gt;src/i18n/&lt;/code&gt; by adding the &lt;code&gt;comments.replyTo&lt;/code&gt; field; all other fields remain unchanged. To apply the changes, simply add the new field&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;v26317\&quot;&gt;v26.3.17&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Changed the style of comment avatars to circular&lt;/li&gt;\n&lt;li&gt;Adjusted the margins of some components&lt;/li&gt;\n&lt;li&gt;This update modifies the configuration file &lt;code&gt;src/i18n/&lt;/code&gt; by adding the &lt;code&gt;themeInfo&lt;/code&gt; field; all other fields remain unchanged. To apply the changes, simply add the new field&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Translated with DeepL.com (free version)&lt;/p&gt;\n&lt;h3 id=\&quot;v26311\&quot;&gt;v26.3.11&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;Initial release version &lt;code&gt;v26.3.11&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Multiple project improvements, including: optimized mobile experience, unified website color scheme&lt;/li&gt;\n&lt;li&gt;This update modifies the configuration file &lt;code&gt;src/i18n/&lt;/code&gt;. We recommend using the latest version and updating the &lt;code&gt;cover.title&lt;/code&gt; and &lt;code&gt;cover.subtitle&lt;/code&gt; fields with your own information.&lt;/li&gt;\n&lt;/ul&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;version-number-unchanged&quot;],&quot;text&quot;:[0,&quot;Version Number Unchanged&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;version-number-changed&quot;],&quot;text&quot;:[0,&quot;Version Number Changed&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;version-information&quot;],&quot;text&quot;:[0,&quot;Version Information&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26329&quot;],&quot;text&quot;:[0,&quot;v26.3.29&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26317&quot;],&quot;text&quot;:[0,&quot;v26.3.17&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;v26311&quot;],&quot;text&quot;:[0,&quot;v26.3.11&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Update Guide and Release&quot;],&quot;pubDate&quot;:[3,&quot;2026-03-11T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;],&quot;image&quot;:[0,&quot;./images/banner.png&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/release&quot;],&quot;minutes&quot;:[0,2],&quot;words&quot;:[0,357]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;test/special&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Testing Special Markdown&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-12T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Article functionality test&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/test/special&quot;],&quot;category&quot;:[0,&quot;Test&quot;]}],&quot;body&quot;:[0,&quot;## Tets Quote\n\n### Normal Quote\n\n:::quote\n\nThe universe is a dark forest. Every civilization is an armed hunter stalking through the trees like a ghost, gently pushing aside branches that block the path and trying to tread without sound. Even breathing is done with care. The hunter has to be careful, because everywhere in the forest are stealthy hunters like him. If he finds other life—another hunter, an angel or a demon, a delicate infant or a tottering old man, a fairy or a demigod—there’s only one thing he can do: open fire and eliminate them.\n\n&lt;br&gt;&lt;right&gt;——*The Dark Forest*&lt;/right&gt;\n:::\n\n### Math Quote\n\n:::quote\n$E = mc^2$\n:::\n\n## Card Testing\n\n### Music Card\n\n::music{id=\&quot;30431366\&quot;}\n\n### Github Card\n\n::github{repo=\&quot;Motues/Momo\&quot;}\n\n## Special Syntax\n\n### Blur Effect\n\nHere is a !!blur!! effect. \n\nOn desktop, hovering removes the blur, and clicking keeps it clear for 3 seconds. On mobile, clicking removes the blur, but it only becomes blurry again after 3 seconds have passed since the click and the page has been scrolled.\n\n### Pinyin\n\nBelow words will show pinyin:\n\n{拼音}(pīn|yīn)，{君の名は}(きみ||な|)\n\n### Rainbow Text\n\nThis is an ==rainbow== text effect.\n\n### Nested Effect\n\nThe above styles can be nested, such as:\n\n!!==Do you like the movie {君の名は}(きみ||な|)==!!\n\n## Typst Testing\n\nTypst rendering based on [Typst.ts](https://myriad-dreamin.github.io/typst.ts/).\n\nImages may not display optimally in dark mode.\n\n```typst\n#set page(width: auto, height: auto, margin: 10pt)\n#set text(fill: rgb(\&quot;#2f61eb\&quot;), size: 20pt)\n\n$ cal(A) = pi r^2 $\n\nHello from *Typst*!\n```\n\n```typst *Waves*\n// Code from https://github.com/typst/packages/blob/main/packages/preview/cetz/0.4.2/gallery/waves.typ\n#import \&quot;@preview/cetz:0.4.2\&quot;: canvas, draw, vector, matrix\n\n#set page(width: auto, height: auto, margin: .5cm)\n\n#canvas({\n  import draw: *\n\n  ortho(y: -30deg, x: 30deg, {\n    on-xz({\n      grid((0,-2), (8,2), stroke: gray + .5pt)\n    })\n\n    // Draw a sine wave on the xy plane\n    let wave(amplitude: 1, fill: none, phases: 2, scale: 8, samples: 100) = {\n      line(..(for x in range(0, samples + 1) {\n        let x = x / samples\n        let p = (2 * phases * calc.pi) * x\n        ((x * scale, calc.sin(p) * amplitude),)\n      }), fill: fill)\n\n      let subdivs = 8\n      for phase in range(0, phases) {\n        let x = phase / phases\n        for div in range(1, subdivs + 1) {\n          let p = 2 * calc.pi * (div / subdivs)\n          let y = calc.sin(p) * amplitude\n          let x = x * scale + div / subdivs * scale / phases\n          line((x, 0), (x, y), stroke: rgb(0, 0, 0, 150) + .5pt)\n        }\n      }\n    }\n\n    on-xy({\n      wave(amplitude: 1.6, fill: rgb(84, 219, 219, 80))\n    })\n    on-xz({\n      wave(amplitude: 1, fill: rgb(216, 219, 90, 80))\n    })\n  })\n})\n```\n\n## Alert Component Testing\n\n### Single-Line Content Testing\n\n:::note\nThis is a note.\n:::\n\n:::tip\nThis is a tip.\n:::\n\n:::important\nThis is an important note.\n:::\n\n:::warning\nThis is a warning.\n:::\n\n:::caution\nThis is a cautionary note.\n:::\n\n\n### Multi-Line Content Testing\n\n:::tip\nThis is a tip box containing multiple lines of content.\n\n- Supports list items\n- Can contain multiple paragraphs\n\n**Key Feature**: Also supports bold text and other Markdown elements.\n:::\n\n### Nested Content Testing\n\n:::warning\nTip boxes can contain other elements like code blocks.\n\n```javascript\nconsole.log(‘Hello World’);\n```\n:::\n\n### Custom Header Test\n\n:::important[Custom Header]\nThis is a tip box with a custom header. The header displays as \&quot;Custom Header\&quot; instead of the default “IMPORTANT”.\n:::&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/test/special/en.md&quot;],&quot;digest&quot;:[0,&quot;c8e07cf5849eea8d&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;tets-quote\&quot;&gt;Tets Quote&lt;/h2&gt;\n&lt;h3 id=\&quot;normal-quote\&quot;&gt;Normal Quote&lt;/h3&gt;\n&lt;div class=\&quot;quote\&quot;&gt;The universe is a dark forest. Every civilization is an armed hunter stalking through the trees like a ghost, gently pushing aside branches that block the path and trying to tread without sound. Even breathing is done with care. The hunter has to be careful, because everywhere in the forest are stealthy hunters like him. If he finds other life—another hunter, an angel or a demon, a delicate infant or a tottering old man, a fairy or a demigod—there’s only one thing he can do: open fire and eliminate them.&lt;br&gt;&lt;br&gt;&lt;right&gt;——&lt;em&gt;The Dark Forest&lt;/em&gt;&lt;/right&gt;&lt;/div&gt;\n&lt;h3 id=\&quot;math-quote\&quot;&gt;Math Quote&lt;/h3&gt;\n&lt;div class=\&quot;quote\&quot;&gt;&lt;span class=\&quot;katex\&quot;&gt;&lt;span class=\&quot;katex-mathml\&quot;&gt;&lt;math xmlns=\&quot;http://www.w3.org/1998/Math/MathML\&quot;&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mi&gt;m&lt;/mi&gt;&lt;msup&gt;&lt;mi&gt;c&lt;/mi&gt;&lt;mn&gt;2&lt;/mn&gt;&lt;/msup&gt;&lt;/mrow&gt;&lt;annotation encoding=\&quot;application/x-tex\&quot;&gt;E = mc^2&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&quot;katex-html\&quot; aria-hidden=\&quot;true\&quot;&gt;&lt;span class=\&quot;base\&quot;&gt;&lt;span class=\&quot;strut\&quot; style=\&quot;height:0.6833em;\&quot;&gt;&lt;/span&gt;&lt;span class=\&quot;mord mathnormal\&quot; style=\&quot;margin-right:0.05764em;\&quot;&gt;E&lt;/span&gt;&lt;span class=\&quot;mspace\&quot; style=\&quot;margin-right:0.2778em;\&quot;&gt;&lt;/span&gt;&lt;span class=\&quot;mrel\&quot;&gt;=&lt;/span&gt;&lt;span class=\&quot;mspace\&quot; style=\&quot;margin-right:0.2778em;\&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&quot;base\&quot;&gt;&lt;span class=\&quot;strut\&quot; style=\&quot;height:0.8141em;\&quot;&gt;&lt;/span&gt;&lt;span class=\&quot;mord mathnormal\&quot;&gt;m&lt;/span&gt;&lt;span class=\&quot;mord\&quot;&gt;&lt;span class=\&quot;mord mathnormal\&quot;&gt;c&lt;/span&gt;&lt;span class=\&quot;msupsub\&quot;&gt;&lt;span class=\&quot;vlist-t\&quot;&gt;&lt;span class=\&quot;vlist-r\&quot;&gt;&lt;span class=\&quot;vlist\&quot; style=\&quot;height:0.8141em;\&quot;&gt;&lt;span style=\&quot;top:-3.063em;margin-right:0.05em;\&quot;&gt;&lt;span class=\&quot;pstrut\&quot; style=\&quot;height:2.7em;\&quot;&gt;&lt;/span&gt;&lt;span class=\&quot;sizing reset-size6 size3 mtight\&quot;&gt;&lt;span class=\&quot;mord mtight\&quot;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;\n&lt;h2 id=\&quot;card-testing\&quot;&gt;Card Testing&lt;/h2&gt;\n&lt;h3 id=\&quot;music-card\&quot;&gt;Music Card&lt;/h3&gt;\n&lt;a id=\&quot;MClzw16m-card\&quot; class=\&quot;card-music fetch-waiting no-styling\&quot; data-song-id=\&quot;30431366\&quot; href=\&quot;https://music.163.com/#/song?id=30431366\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer\&quot;&gt;&lt;div class=\&quot;music-card\&quot;&gt;&lt;div class=\&quot;music-cover-wrapper\&quot; id=\&quot;MClzw16m-cover-wrapper\&quot;&gt;&lt;div id=\&quot;MClzw16m-cover\&quot; class=\&quot;music-cover\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;music-info\&quot;&gt;&lt;div class=\&quot;music-header\&quot;&gt;&lt;div id=\&quot;MClzw16m-title\&quot; class=\&quot;music-title\&quot;&gt;Waiting for API...&lt;/div&gt;&lt;div id=\&quot;MClzw16m-artist\&quot; class=\&quot;music-artist\&quot;&gt;Waiting...&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;script id=\&quot;MClzw16m-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const initMusicCard = () =&gt; {\n                const card = document.getElementById(&#39;MClzw16m-card&#39;);\n                // 幂等性检查：如果卡片不存在，或已经标记为加载完成，则不再执行\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://163api.qijieya.cn/song/detail?ids=30431366&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data &amp;&amp; data.songs &amp;&amp; data.songs.length &gt; 0) {\n                            const song = data.songs[0];\n                            \n                            // 更新标题\n                            const titleEl = document.getElementById(&#39;MClzw16m-title&#39;);\n                            if (titleEl) titleEl.innerText = song.name || \&quot;未知曲目\&quot;;\n                            \n                            // 更新艺术家\n                            const artistEl = document.getElementById(&#39;MClzw16m-artist&#39;);\n                            const artistName = song.ar ? song.ar.map(a =&gt; a.name).join(&#39;, &#39;) : &#39;未知艺术家&#39;;\n                            if (artistEl) artistEl.innerText = artistName;\n                            \n                            // 更新封面\n                            const coverEl = document.getElementById(&#39;MClzw16m-cover&#39;);\n                            if (coverEl &amp;&amp; song.al &amp;&amp; song.al.picUrl) {\n                                coverEl.style.backgroundImage = &#39;url(&#39; + song.al.picUrl + &#39;)&#39;;\n                                coverEl.style.backgroundColor = &#39;transparent&#39;;\n                            }\n\n                            // 移除等待状态并加锁\n                            card.classList.remove(\&quot;fetch-waiting\&quot;);\n                            card.dataset.loaded = \&quot;true\&quot;;\n                            console.log(\&quot;[MUSIC-CARD] Loaded: 30431366\&quot;);\n                        }\n                    })\n                    .catch(err =&gt; {\n                        const cardEl = document.getElementById(&#39;MClzw16m-card&#39;);\n                        cardEl?.classList.add(\&quot;fetch-error\&quot;);\n                        console.warn(\&quot;[MUSIC-CARD] Error loading 30431366:\&quot;, err);\n                    });\n            };\n\n            initMusicCard();\n            document.addEventListener(&#39;astro:page-load&#39;, initMusicCard);\n        })();\n        &lt;/script&gt;&lt;/a&gt;\n&lt;h3 id=\&quot;github-card\&quot;&gt;Github Card&lt;/h3&gt;\n&lt;a id=\&quot;GC1swxvq-card\&quot; class=\&quot;card-github fetch-waiting no-styling\&quot; href=\&quot;https://github.com/Motues/Momo\&quot; target=\&quot;_blank\&quot; data-repo=\&quot;Motues/Momo\&quot;&gt;&lt;div class=\&quot;gc-titlebar\&quot;&gt;&lt;div class=\&quot;gc-titlebar-left\&quot;&gt;&lt;div class=\&quot;gc-owner\&quot;&gt;&lt;div id=\&quot;GC1swxvq-avatar\&quot; class=\&quot;gc-avatar\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;gc-user\&quot;&gt;Motues&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;gc-divider\&quot;&gt;/&lt;/div&gt;&lt;div class=\&quot;gc-repo\&quot;&gt;Momo&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;github-logo\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=\&quot;GC1swxvq-description\&quot; class=\&quot;gc-description\&quot;&gt;Waiting for api.github.com...&lt;/div&gt;&lt;div class=\&quot;gc-infobar\&quot;&gt;&lt;div id=\&quot;GC1swxvq-stars\&quot; class=\&quot;gc-stars\&quot;&gt;00K&lt;/div&gt;&lt;div id=\&quot;GC1swxvq-forks\&quot; class=\&quot;gc-forks\&quot;&gt;0K&lt;/div&gt;&lt;div id=\&quot;GC1swxvq-license\&quot; class=\&quot;gc-license\&quot;&gt;0K&lt;/div&gt;&lt;span id=\&quot;GC1swxvq-language\&quot; class=\&quot;gc-language\&quot;&gt;Waiting...&lt;/span&gt;&lt;/div&gt;&lt;script id=\&quot;GC1swxvq-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const fetchCardData = () =&gt; {\n                const card = document.getElementById(&#39;GC1swxvq-card&#39;);\n                // 如果找不到卡片，或者卡片已经加载过数据，则跳过\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://api.github.com/repos/Motues/Momo&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data.message === \&quot;Not Found\&quot;) throw new Error(\&quot;Repo not found\&quot;);\n                        \n                        document.getElementById(&#39;GC1swxvq-description&#39;).innerText = data.description?.replace(/:[a-zA-Z0-9_]+:/g, &#39;&#39;) || \&quot;Description not set\&quot;;\n                        document.getElementById(&#39;GC1swxvq-language&#39;).innerText = data.language || \&quot;Unknown\&quot;;\n                        \n                        const fmt = Intl.NumberFormat(&#39;en-us&#39;, { notation: \&quot;compact\&quot;, maximumFractionDigits: 1 });\n                        document.getElementById(&#39;GC1swxvq-forks&#39;).innerText = fmt.format(data.forks).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GC1swxvq-stars&#39;).innerText = fmt.format(data.stargazers_count).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GC1swxvq-license&#39;).innerText = data.license?.spdx_id || \&quot;No License\&quot;;\n\n                        const avatarEl = document.getElementById(&#39;GC1swxvq-avatar&#39;);\n                        avatarEl.style.backgroundImage = &#39;url(&#39; + data.owner.avatar_url + &#39;)&#39;;\n                        avatarEl.style.backgroundColor = &#39;transparent&#39;;\n\n                        card.classList.remove(\&quot;fetch-waiting\&quot;);\n                        card.dataset.loaded = \&quot;true\&quot;; // 标记加载
